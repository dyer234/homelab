services:
  backups:
    image: rclone/rclone:latest
    container_name: backups
    entrypoint: /bin/sh
    command:
      - /opt/backup/backup.sh
    environment:
      - TZ=${TZ}
      - RCLONE_CONFIG=/opt/backup/rclone.conf
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backup.sh:/opt/backup/backup.sh:ro
      - ./rclone.conf:/opt/backup/rclone.conf:ro
      - ./exclude-filters.txt:/opt/backup/exclude-filters.txt:ro
      - ../home-traefik/letsencrypt:/data/home-traefik/letsencrypt:ro
      - ../media-streaming/config:/data/media-streaming/config:ro
      - ../n8n/data:/data/n8n/data:ro
      - ../ai/open-webui:/data/ai/open-webui:ro
      - ../navidrome/config:/data/navidrome/config:ro
      - ../jenkins/data:/data/jenkins/data:ro
    restart: unless-stopped
