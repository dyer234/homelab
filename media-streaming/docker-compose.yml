
networks:
  media_net:
    driver: bridge

services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: homarr
    environment:
      - TZ=${TZ}
    volumes:
      - ./config/homarr/configs:/app/data/configs
      - ./config/homarr/icons:/app/public/icons
      - ./config/homarr/data:/data
    ports:
      - 7575:7575
    networks:
      - media_net
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - 9696:9696
    networks:
      - media_net
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    ports:
      - 8989:8989
    networks:
      - media_net
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}    
    ports:
      - 7878:7878
    networks:
      - media_net
    restart: unless-stopped

  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/emby:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    ports:
      - 8096:8096
      - 8920:8920
    networks:
      - media_net
    restart: unless-stopped
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    labels:
      - "autoheal=true"
    cap_add:
      - NET_ADMIN
    dns:
    - 1.1.1.1
    - 9.9.9.9
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/wireguard:/config
      - ./wireguard:/opt/wireguard
      #- ./config/wireguard:/config
      # optional; some hosts need this, some don't:
      # - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "8181:8181/tcp"       # qBittorrent WebUI (through VPN container)
      - "6881:6881/tcp"       # torrent port (fixed)
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/wireguard/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - media_net
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      - "autoheal=true"
    network_mode: "service:wireguard"
    healthcheck:
      test: ["CMD-SHELL", "test -d /sys/class/net/wg0 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 30s
    depends_on:
      - wireguard
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8181
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    restart: unless-stopped
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/bazarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    ports:
      - 6767:6767
    networks:
      - media_net
    restart: unless-stopped
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - media_net
    restart: unless-stopped
