
networks:
  media_net:
    driver: bridge
  traefik-public:
    external: true

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/prowlarr:/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prowlarr.rule=Host(`prowlarr.${DOMAIN}`)"
      - "traefik.http.routers.prowlarr.entrypoints=websecure"
      - "traefik.http.routers.prowlarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.prowlarr.loadbalancer.server.port=9696"
      - "homepage.group=Find New"
      - "homepage.name=Prowlarr"
      - "homepage.icon=prowlarr.png"
      - "homepage.href=https://prowlarr.${DOMAIN}"
      - "homepage.description=Indexer Manager"
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/sonarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.routers.sonarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
      - "homepage.group=Find New"
      - "homepage.name=Sonarr"
      - "homepage.icon=sonarr.png"
      - "homepage.href=https://sonarr.${DOMAIN}"
      - "homepage.description=TV Shows"
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/radarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
      - "homepage.group=Find New"
      - "homepage.name=Radarr"
      - "homepage.icon=radarr.png"
      - "homepage.href=https://radarr.${DOMAIN}"
      - "homepage.description=Movies"
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  emby:
    image: lscr.io/linuxserver/emby:latest
    container_name: emby
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/emby:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.emby.rule=Host(`emby.${DOMAIN}`)"
      - "traefik.http.routers.emby.entrypoints=websecure"
      - "traefik.http.routers.emby.tls.certresolver=letsencrypt"
      - "traefik.http.services.emby.loadbalancer.server.port=8096"
      - "homepage.group=Media"
      - "homepage.name=Emby"
      - "homepage.icon=emby.png"
      - "homepage.href=https://emby.${DOMAIN}"
      - "homepage.description=Media Server"
      - "homepage.widget.type=emby"
      - "homepage.widget.url=http://emby:8096"
      - "homepage.widget.key=${EMBY_API_KEY}"
      - "homepage.widget.enableBlocks=true"
      - "homepage.widget.enableNowPlaying=true"
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: wireguard
    labels:
      - "autoheal=true"
      # qBittorrent routes through wireguard's network,
      # so Traefik labels for qbit go HERE
      - "traefik.enable=true"
      - "traefik.http.routers.qbittorrent.rule=Host(`qbit.${DOMAIN}`)"
      - "traefik.http.routers.qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.qbittorrent.tls.certresolver=letsencrypt"
      - "traefik.http.services.qbittorrent.loadbalancer.server.port=8181"
      - "homepage.group=Downloads"
      - "homepage.name=qBittorrent"
      - "homepage.icon=qbittorrent.png"
      - "homepage.href=https://qbit.${DOMAIN}"
      - "homepage.description=Torrent Client"
      - "homepage.widget.type=qbittorrent"
      - "homepage.widget.url=http://wireguard:8181"
    cap_add:
      - NET_ADMIN
    dns:
      - 1.1.1.1
      - 9.9.9.9
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/wireguard:/config
      - ./wireguard:/opt/wireguard
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "6881:6881/tcp"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD-SHELL", "sh /opt/wireguard/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    labels:
      - "autoheal=true"
    network_mode: "service:wireguard"
    healthcheck:
      test: ["CMD-SHELL", "test -d /sys/class/net/wg0 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 30s
    depends_on:
      - wireguard
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
      - WEBUI_PORT=8181
    volumes:
      - ./config/qbittorrent:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ}
    volumes:
      - ./config/bazarr:/config
      - ${MEDIA_HOST}:${MEDIA_CONTAINER}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.${DOMAIN}`)"
      - "traefik.http.routers.bazarr.entrypoints=websecure"
      - "traefik.http.routers.bazarr.tls.certresolver=letsencrypt"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
      - "homepage.group=Find New"
      - "homepage.name=Bazarr"
      - "homepage.icon=bazarr.png"
      - "homepage.href=https://bazarr.${DOMAIN}"
      - "homepage.description=Subtitles"
    networks:
      - media_net
      - traefik-public
    restart: unless-stopped

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=120
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - media_net
    restart: unless-stopped
